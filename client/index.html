    <!-- Inline Critical CSS -->
    <style>
      /* Critical CSS - Inlined for performance */
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap');

      :root {
        /* Core color system */
        --background: 0 0% 100%;
        --foreground: 240 10% 3.9%;
        --primary: 240 5.9% 10%;
        --primary-foreground: 0 0% 98%;
        --secondary: 240 4.8% 95.9%;
        --secondary-foreground: 240 5.9% 10%;
        --border: 240 5.9% 90%;
        --ring: 240 10% 3.9%;
        
        /* Brand colors */
        --primary-blue: #0053AE;
        --luxury-gold: #C29D4F;
        --warm-white: #FEFCF9;
        --soft-gray: #F8F9FA;
        
        /* Typography */
        --font-sans: "Poppins", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
        --font-serif: "Cormorant Garamond", "Playfair Display", Georgia, serif;
        --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Consolas, "Liberation Mono", Menlo, monospace;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        scroll-behavior: smooth;
        overflow-x: hidden;
        width: 100%;
      }

      body {
        background-color: hsl(var(--background));
        color: hsl(var(--foreground));
        font-family: var(--font-sans);
        font-feature-settings: "rlig" 1, "calt" 1;
        overflow-x: hidden;
        width: 100%;
        min-width: 320px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      h1, h2, h3, h4, h5, h6 {
        font-family: var(--font-serif);
        font-weight: 600;
        line-height: 1.25;
      }

      img {
        max-width: 100%;
        height: auto;
        display: block;
      }

      /* Loading skeleton for above-the-fold content */
      .skeleton {
        background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
        background-size: 200% 100%;
        animation: loading 1.5s infinite;
      }

      @keyframes loading {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      /* Critical hero section styles */
      .hero-container {
        min-height: 100vh;
        position: relative;
        overflow: hidden;
        background: #162660;
      }

      .hero-content {
        position: relative;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        color: white;
      }

      .hero-title {
        font-family: var(--font-serif);
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 1rem;
        opacity: 0;
        animation: fadeInUp 1s ease-out 0.5s forwards;
      }

      @media (min-width: 768px) {
        .hero h1 {
          font-size: 4rem;
        }
      }

      .hero p {
        font-size: 1.25rem;
        margin-bottom: 2rem;
        opacity: 0.9;
      }

      /* Accessibility improvements */
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      /* Focus styles for accessibility */
      *:focus {
        outline: 2px solid var(--primary-blue);
        outline-offset: 2px;
      }

      /* Skip to main content link */
      .skip-link {
        position: absolute;
        top: -40px;
        left: 6px;
        background: var(--primary-blue);
        color: white;
        padding: 8px;
        text-decoration: none;
        border-radius: 4px;
        z-index: 100;
      }

      .skip-link:focus {
        top: 6px;
      }
    </style>
    
    <!-- Async CSS Loading Script -->
    <script>
      function loadCSS(href) {
        var link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = href;
        link.media = 'only x';
        document.head.appendChild(link);
        setTimeout(function() {
          link.media = 'all';
        }, 0);
      }
      
      // Load non-critical CSS asynchronously
      window.addEventListener('load', function() {
        loadCSS('/src/index.css');
        loadCSS('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css');
      });
    </script>
